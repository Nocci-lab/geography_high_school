<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>About_NorthAmerica</title><style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#1f2937;--muted:#6b7280;--accent:#2563eb;--ok:#16a34a;--ng:#dc2626;--line:#e5e7eb;--warn:#b45309}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:#f5f7fb;color:var(--ink);min-height:100vh}header{background:linear-gradient(135deg,#0f766e,#38bdf8);color:white;text-align:center;padding:18px 16px 14px}h1{margin:0;font-size:clamp(22px,4vw,34px)}header p{margin:.5rem 0 0;font-size:15px;opacity:.95}main{max-width:1200px;margin:0 auto;padding:16px}.panel{background:white;border-radius:18px;padding:14px;box-shadow:0 8px 24px rgba(15,23,42,.08);margin-bottom:16px}.hint{font-size:14px;color:#64748b;line-height:1.8;margin-top:8px}.quizBox{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.question{font-size:clamp(20px,3.6vw,30px);font-weight:800;line-height:1.6;white-space:pre-line}.question .num{display:inline-grid;place-items:center;min-width:72px;height:64px;padding:0 14px;border-radius:999px;background:#fef3c7;color:var(--warn);border:3px solid #f59e0b;margin:0 6px}.stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 12px;font-weight:700}.chip.warn{background:#fff7ed;color:#c2410c}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center}button{border:none;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:16px;transition:.12s transform,.12s background}button:active{transform:scale(.98)}.primary{background:var(--accent);color:white}.secondary{background:#e5e7eb;color:#111827}.danger{background:#fee2e2;color:#991b1b}.reviewBtn{background:#fff7ed;color:#9a3412}button:disabled{opacity:.45;cursor:not-allowed}#message{min-height:48px;padding:12px 14px;border-radius:14px;font-size:18px;font-weight:800;background:#f1f5f9;margin-top:12px}#message.good{background:#dcfce7;color:#166534}#message.bad{background:#fee2e2;color:#991b1b}#message.info{background:#eff6ff;color:#1d4ed8}.choices{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-top:12px}.choice{background:#f8fafc;border:2px solid #e5e7eb;color:#111827;min-height:46px}.choice:hover{background:#eff6ff;border-color:#93c5fd}.choice.correct{background:#dcfce7;border-color:#22c55e;color:#166534}.choice.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b}.detailsBox{display:none;margin-top:12px;padding:12px;border:1px dashed #cbd5e1;border-radius:14px;background:#fafafa}.listGrid{columns:2 260px;gap:24px}.listGrid div{break-inside:avoid;padding:4px 0;border-bottom:1px dotted #e5e7eb}.subTitle{font-weight:800;margin-bottom:8px}.modeTag{font-weight:800;color:#1d4ed8;margin-left:6px}#confettiCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999}@media(max-width:700px){.quizBox{grid-template-columns:1fr}.stats{justify-content:flex-start}.question .num{min-width:60px;height:54px}.choices{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}}
</style></head><body><header><h1>北アメリカ 要点まとめゲーム</h1><p>北アメリカの概観・地形・国境・気候を復習します。順番・ランダム・復習モードが使えます。</p></header><main>
<section class="panel"><div class="quizBox"><div><div class="modeTag" id="modeLabel">まだ開始していません</div><div class="question" id="question">スタートボタンを押してください。</div></div><div class="stats"><span class="chip" id="progressChip">進み具合：0 / 24</span><span class="chip" id="scoreChip">正解：0</span><span class="chip warn" id="wrongChip">間違い：0（復習 0問）</span></div></div><div id="choices" class="choices"></div><div id="message" class="info">順番にやるか、ランダムでやるかを選べます。</div><div class="controls"><button class="primary" onclick="startQuiz('all','sequential')">順番にスタート</button><button class="primary" onclick="startQuiz('all','random')">ランダムにスタート</button><button class="reviewBtn" id="reviewSeqBtn" onclick="startQuiz('wrong','sequential')" disabled>間違えた問題だけ・順番</button><button class="reviewBtn" id="reviewRandBtn" onclick="startQuiz('wrong','random')" disabled>間違えた問題だけ・ランダム</button><button class="secondary" onclick="showAnswer()">答えを見る</button><button class="secondary" onclick="nextQuestion()">次へ</button><button class="secondary" onclick="shuffleCurrent()">今の問題をシャッフル</button><button class="secondary" onclick="toggleDetails()">答え一覧</button><button class="danger" onclick="resetAll()">記録リセット</button></div></section><section class="panel"><div class="subTitle">復習リスト</div><div id="reviewList"></div></section><section id="detailsBox" class="detailsBox"><div class="subTitle">答え一覧</div><div class="listGrid" id="answerList"></div></section></main><canvas id="confettiCanvas" class="hidden"></canvas><script>const DATA=[{"no":1,"answer":"アングロアメリカ","q":"【北アメリカ概観】\n北アメリカ大陸のうち、アメリカ合衆国とカナダを含む地域を何という？","note":"アメリカ合衆国とカナダを含む地域＝アングロアメリカ。"},{"no":2,"answer":"メキシコ","q":"【北アメリカの結びつき】\nUSMCAは、（　）、アメリカ、カナダの3国間の自由貿易協定。空欄は？","note":"USMCAはアメリカ・メキシコ・カナダ協定。"},{"no":3,"answer":"アメリカ","q":"【北アメリカの結びつき】\nUSMCAは、メキシコ、（　）、カナダの3国間の自由貿易協定。空欄は？","note":"USMCAはアメリカ・メキシコ・カナダ協定。"},{"no":4,"answer":"カナダ","q":"【北アメリカの結びつき】\nUSMCAは、メキシコ、アメリカ、（　）の3国間の自由貿易協定。空欄は？","note":"USMCAはアメリカ・メキシコ・カナダ協定。"},{"no":5,"answer":"ロッキー","q":"【地形】\n西部には高く険しい（　）山脈がある。空欄は？","note":"ロッキー山脈。新期造山帯。"},{"no":6,"answer":"アパラチア","q":"【地形】\n東部には低くなだらかな（　）山脈がある。空欄は？","note":"アパラチア山脈。古期造山帯。"},{"no":7,"answer":"グレートプレーンズ","q":"【地形】\n2つの山脈の間に広がる大平原の1つ。（　）はロッキー山脈の東側に広がる。","note":"グレートプレーンズ。"},{"no":8,"answer":"プレーリー","q":"【地形】\n2つの山脈の間に広がる草原地帯。（　）は北アメリカ中央部の草原。","note":"プレーリー。"},{"no":9,"answer":"中央平原","q":"【地形】\n2つの山脈の間に広がる平原の1つ。（　）はミシシッピ川流域に広がる。","note":"中央平原。"},{"no":10,"answer":"ミシシッピ","q":"【河川】\n北アメリカ大陸最長の川は（　）川。空欄は？","note":"ミシシッピ川。"},{"no":11,"answer":"メキシコ湾","q":"【河川】\nミシシッピ川は（　）に注いでいる。空欄は？","note":"ミシシッピ川はメキシコ湾に注ぐ。"},{"no":12,"answer":"五大湖","q":"【湖】\nアメリカ・カナダ国境付近にあり、氷河の影響を受けてできた湖のまとまりは？","note":"五大湖。"},{"no":13,"answer":"自然的国境","q":"【国境】\n自然環境を利用した国境を何という？","note":"川・湖・山脈などを利用した国境＝自然的国境。"},{"no":14,"answer":"人為的国境","q":"【国境】\n経線・緯線などで定めた国境を何という？","note":"数理的国境ともいう。"},{"no":15,"answer":"リオグランデ","q":"【国境】\nアメリカとメキシコの国境の一部になっている川は（　）川。","note":"リオグランデ川。自然的国境。"},{"no":16,"answer":"ツンドラ","q":"【気候】\n北極圏周辺に広がる、夏に表面の氷がとけてコケ類などが生育する気候は？","note":"ツンドラ気候。"},{"no":17,"answer":"タイガ","q":"【気候】\nツンドラ気候の南側から五大湖周辺までに分布する針葉樹林帯を何という？","note":"タイガ。"},{"no":18,"answer":"ブリザード","q":"【気候】\n冬季に地吹雪などをもたらす低温の強風を何という？","note":"ブリザード。"},{"no":19,"answer":"100","q":"【気候】\n北緯40度以南では、西経（　）度付近を境に、東側は湿潤、西側は乾燥する。","note":"西経100度付近が目安。"},{"no":20,"answer":"東","q":"【気候】\n西経100度付近を境に、（　）側は湿潤。空欄は？","note":"東側は湿潤。"},{"no":21,"answer":"西","q":"【気候】\n西経100度付近を境に、（　）側は乾燥。空欄は？","note":"西側は乾燥。"},{"no":22,"answer":"トルネード","q":"【気候災害】\n中央平原で春先に発生しやすい大きな竜巻を何という？","note":"トルネード。"},{"no":23,"answer":"地中海性","q":"【気候】\n太平洋岸の一部に見られる、夏は乾燥・冬は湿潤の温帯の気候は（　）気候。","note":"地中海性気候。"},{"no":24,"answer":"ハリケーン","q":"【気候災害】\nメキシコ湾やカリブ海沿岸で被害をもたらす熱帯低気圧を何という？","note":"ハリケーン。"}];
const ALL_ANSWERS=DATA.map(x=>x.answer);let queue=[],idx=0,score=0,wrongThisRound=0,answered=false,currentMode='all';let wrongNos=JSON.parse(localStorage.getItem('AboutNorthAmericaWrongNos')||'[]');
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(mode='all',order='sequential'){currentMode=mode;const base=mode==='wrong'?DATA.filter(x=>wrongNos.includes(x.no)):DATA;if(base.length===0){alert('復習する問題はまだありません。');return;}queue=order==='random'?shuffle(base):[...base];idx=0;score=0;wrongThisRound=0;answered=false;document.getElementById('modeLabel').textContent=(mode==='wrong'?'復習モード':'全問モード')+' / '+(order==='random'?'ランダム':'順番');renderQuestion();updateStats();renderReview();}
function shuffleCurrent(){if(queue.length===0){startQuiz('all','random');return;}queue=shuffle(queue);idx=0;score=0;wrongThisRound=0;answered=false;document.getElementById('modeLabel').textContent=(currentMode==='wrong'?'復習モード':'全問モード')+' / シャッフル';renderQuestion();updateStats();}
function makeChoices(ans){return shuffle([ans,...shuffle(ALL_ANSWERS.filter(a=>a!==ans)).slice(0,5)]);}
function renderQuestion(){const item=queue[idx];if(!item){finishQuiz();return;}answered=false;document.getElementById('question').innerHTML='No.<span class="num">'+item.no+'</span> '+item.q.replace(/\n/g,'<br>');document.getElementById('message').textContent='答えを選んでください。';document.getElementById('message').className='';const choices=document.getElementById('choices');choices.innerHTML='';makeChoices(item.answer).forEach(choice=>{const b=document.createElement('button');b.className='choice';b.textContent=choice;b.onclick=()=>checkAnswer(b,choice);choices.appendChild(b);});updateStats();}
function checkAnswer(btn,choice){if(answered)return;answered=true;const item=queue[idx];document.querySelectorAll('.choice').forEach(b=>{if(b.textContent===item.answer)b.classList.add('correct');b.disabled=true;});const msg=document.getElementById('message');if(choice===item.answer){score++;msg.textContent='正解！ '+item.answer+' / '+item.note;msg.className='good';wrongNos=wrongNos.filter(n=>n!==item.no);}else{wrongThisRound++;btn.classList.add('wrong');msg.textContent='残念。正解は「'+item.answer+'」です。 '+item.note;msg.className='bad';if(!wrongNos.includes(item.no))wrongNos.push(item.no);}localStorage.setItem('AboutNorthAmericaWrongNos',JSON.stringify(wrongNos));updateStats();renderReview();}
function showAnswer(){if(queue.length===0)return;answered=true;const item=queue[idx];document.querySelectorAll('.choice').forEach(b=>{if(b.textContent===item.answer)b.classList.add('correct');b.disabled=true;});const msg=document.getElementById('message');msg.textContent='答え：'+item.answer+' / '+item.note;msg.className='info';}
function nextQuestion(){if(queue.length===0){startQuiz('all','sequential');return;}idx++;if(idx>=queue.length)finishQuiz();else renderQuestion();}
function finishQuiz(){document.getElementById('question').textContent='終了！';document.getElementById('choices').innerHTML='';let text='おつかれさま！ 正解 '+score+' / '+queue.length+' 問でした。';if(wrongNos.length===0){text+=' 復習リストは空です。';celebrate();}else{text+=' 間違えた問題だけで復習できます。';}document.getElementById('message').textContent=text;document.getElementById('message').className=wrongNos.length===0?'good':'info';updateStats();renderReview();}
function updateStats(){const total=queue.length||DATA.length;const now=queue.length?Math.min(idx+1,total):0;document.getElementById('progressChip').textContent='進み具合：'+now+' / '+total;document.getElementById('scoreChip').textContent='正解：'+score;document.getElementById('wrongChip').textContent='間違い：'+wrongThisRound+'（復習 '+wrongNos.length+'問）';document.getElementById('reviewSeqBtn').disabled=wrongNos.length===0;document.getElementById('reviewRandBtn').disabled=wrongNos.length===0;}
function renderReview(){const box=document.getElementById('reviewList');if(wrongNos.length===0){box.innerHTML='<span class="hint">復習リストは空です。</span>';return;}box.innerHTML=wrongNos.sort((a,b)=>a-b).map(no=>{const item=DATA.find(x=>x.no===no);return '<div><b>No.'+item.no+'</b> '+item.answer+' <span class="hint"> '+item.note+'</span></div>';}).join('');}
function toggleDetails(){const el=document.getElementById('detailsBox');el.style.display=el.style.display==='block'?'none':'block';}
function resetAll(){if(!confirm('復習記録と今の点数をリセットしますか？'))return;wrongNos=[];localStorage.removeItem('AboutNorthAmericaWrongNos');queue=[];idx=0;score=0;wrongThisRound=0;answered=false;document.getElementById('modeLabel').textContent='まだ開始していません';document.getElementById('question').textContent='スタートボタンを押してください。';document.getElementById('choices').innerHTML='';document.getElementById('message').textContent='順番にやるか、ランダムでやるかを選べます。';document.getElementById('message').className='info';updateStats();renderReview();}
function buildList(){document.getElementById('answerList').innerHTML=DATA.map(item=>'<div><b>No.'+item.no+'</b> '+item.answer+' <span class="hint"> '+item.note+'</span></div>').join('');}
function celebrate(){const canvas=document.getElementById('confettiCanvas'),ctx=canvas.getContext('2d');canvas.classList.remove('hidden');const dpr=window.devicePixelRatio||1,w=window.innerWidth,h=window.innerHeight;canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);const colors=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#facc15'];const pieces=Array.from({length:220},()=>({x:Math.random()*w,y:-20-Math.random()*h*.3,r:4+Math.random()*8,color:colors[Math.floor(Math.random()*colors.length)],tilt:Math.random()*Math.PI*2,tiltSpeed:.05+Math.random()*.12,vx:-2+Math.random()*4,vy:2+Math.random()*5,rot:Math.random()*Math.PI*2,vr:-.2+Math.random()*.4}));let frame=0;function draw(){ctx.clearRect(0,0,w,h);pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.02;p.tilt+=p.tiltSpeed;p.rot+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.fillRect(-p.r/2,-p.r/2+Math.sin(p.tilt)*2,p.r,p.r*.6);ctx.restore();});frame++;if(frame<320)requestAnimationFrame(draw);else{ctx.clearRect(0,0,w,h);canvas.classList.add('hidden');}}draw();}
buildList();updateStats();renderReview();
</script></body></html>
