<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北アメリカ自然環境 地図ゲーム</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#1f2937;--muted:#6b7280;--accent:#2563eb;--ok:#16a34a;--ng:#dc2626;--line:#e5e7eb;--warn:#b45309}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:#f5f7fb;color:var(--ink);min-height:100vh}
header{background:linear-gradient(135deg,#1d4ed8,#60a5fa);color:white;text-align:center;padding:18px 16px 14px}
h1{margin:0;font-size:clamp(22px,4vw,34px)}
header p{margin:.5rem 0 0;font-size:15px;opacity:.95}
main{max-width:1200px;margin:0 auto;padding:16px}
.panel{background:white;border-radius:18px;padding:14px;box-shadow:0 8px 24px rgba(15,23,42,.08);margin-bottom:16px}
.mapWrap{text-align:center}
.mapWrap img{width:100%;max-width:980px;height:auto;border:2px solid #dbeafe;border-radius:14px;background:white}
.hint{font-size:14px;color:#64748b;line-height:1.8;margin-top:8px}
.quizBox{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.question{font-size:clamp(20px,3.6vw,30px);font-weight:800;line-height:1.6;white-space:pre-line}
.question .num{display:inline-grid;place-items:center;min-width:72px;height:64px;padding:0 14px;border-radius:999px;background:#fef3c7;color:var(--warn);border:3px solid #f59e0b;margin:0 6px}
.stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.chip{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 12px;font-weight:700}
.chip.warn{background:#fff7ed;color:#c2410c}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center}
button{border:none;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:16px;transition:.12s transform,.12s background}
button:active{transform:scale(.98)}
.primary{background:var(--accent);color:white}
.secondary{background:#e5e7eb;color:#111827}
.danger{background:#fee2e2;color:#991b1b}
.reviewBtn{background:#fff7ed;color:#9a3412}
button:disabled{opacity:.45;cursor:not-allowed}
#message{min-height:48px;padding:12px 14px;border-radius:14px;font-size:18px;font-weight:800;background:#f1f5f9;margin-top:12px}
#message.good{background:#dcfce7;color:#166534}
#message.bad{background:#fee2e2;color:#991b1b}
#message.info{background:#eff6ff;color:#1d4ed8}
.choices{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-top:12px}
.choice{background:#f8fafc;border:2px solid #e5e7eb;color:#111827;min-height:46px}
.choice:hover{background:#eff6ff;border-color:#93c5fd}
.choice.correct{background:#dcfce7;border-color:#22c55e;color:#166534}
.choice.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b}
.detailsBox{display:none;margin-top:12px;padding:12px;border:1px dashed #cbd5e1;border-radius:14px;background:#fafafa}
.listGrid{columns:2 260px;gap:24px}
.listGrid div{break-inside:avoid;padding:4px 0;border-bottom:1px dotted #e5e7eb}
.subTitle{font-weight:800;margin-bottom:8px}
.modeTag{font-weight:800;color:#1d4ed8;margin-left:6px}
#confettiCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999}
@media(max-width:700px){.quizBox{grid-template-columns:1fr}.stats{justify-content:flex-start}.question .num{min-width:60px;height:54px}.choices{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}}
</style>
</head>

<header>

</header>

<script>
const DATA = [{"no":1,"answer":"北極海","q":"【海洋】\\n地図中の 1 の海洋名は？","note":"1 は北極海。"},{"no":2,"answer":"太平洋","q":"【海洋】\\n地図中の 2 の海洋名は？","note":"2 は太平洋。"},{"no":3,"answer":"大西洋","q":"【海洋】\\n地図中の 3 の海洋名は？","note":"3 は大西洋。"},{"no":4,"answer":"メキシコ湾","q":"【海】\\n地図中の 4 の海は？","note":"4 はメキシコ湾。"},{"no":5,"answer":"カリブ海","q":"【海】\\n地図中の 5 の海は？","note":"5 はカリブ海。"},{"no":6,"answer":"リオグランデ川","q":"【河川】\\n地図中の 6 の川は？","note":"6 はリオグランデ川。"},{"no":7,"answer":"ミシシッピ川","q":"【河川】\\n地図中の 7 の川は？","note":"7 はミシシッピ川。"},{"no":8,"answer":"セントローレンス川","q":"【河川】\\n地図中の 8 の川は？","note":"8 はセントローレンス川。"},{"no":9,"answer":"五大湖","q":"【湖】\\n地図中の 9 が示す湖のまとまりは？","note":"9 は五大湖。"},{"no":10,"answer":"ロッキー山脈","q":"【山脈】\\n地図中の 10 の山脈は？","note":"10 はロッキー山脈。"},{"no":11,"answer":"グレートプレーンズ","q":"【地形】\\n地図中の 11 の大平原は？","note":"11 はグレートプレーンズ。"},{"no":12,"answer":"プレーリー","q":"【地形・草原】\\n地図中の 12 の草原地帯は？","note":"12 はプレーリー。"},{"no":13,"answer":"中央平原","q":"【地形】\\n地図中の 13 の平原は？","note":"13 は中央平原。"},{"no":14,"answer":"アパラチア山脈","q":"【山脈】\\n地図中の 14 の山脈は？","note":"14 はアパラチア山脈。"},{"no":15,"answer":"西経100度","q":"【経線】\\n地図中の 15 の経線は？","note":"15 は西経100度。"},{"no":16,"answer":"北緯40度","q":"【緯線】\\n地図中の 16 の緯線は？","note":"16 は北緯40度。"},{"no":17,"answer":"ナイアガラ滝","q":"【自然・観光】\\n地図中の 17 の★印は何を示している？","note":"17 はナイアガラ滝。"},{"no":18,"answer":"パナマ運河","q":"【運河】\\n地図中の 18 の★印は何を示している？","note":"18 はパナマ運河。"}];
const ALL_ANSWERS=DATA.map(x=>x.answer);
let queue=[],idx=0,score=0,wrongThisRound=0,answered=false,currentMode='all',currentOrder='sequential';
let wrongNos=JSON.parse(localStorage.getItem('NorthAmericaNatureWrongNos')||'[]');

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(mode='all', order='sequential'){
  currentMode=mode; currentOrder=order;
  const base=mode==='wrong'?DATA.filter(x=>wrongNos.includes(x.no)):DATA;
  if(base.length===0){alert('復習する問題はまだありません。');return;}
  queue=order==='random'?shuffle(base):[...base];
  idx=0;score=0;wrongThisRound=0;answered=false;
  document.getElementById('modeLabel').textContent=(mode==='wrong'?'復習モード':'全問モード')+' / '+(order==='random'?'ランダム':'順番');
  renderQuestion(); updateStats(); renderReview();
}
function shuffleCurrent(){
  if(queue.length===0){startQuiz('all','random');return;}
  queue=shuffle(queue);idx=0;score=0;wrongThisRound=0;answered=false;
  document.getElementById('modeLabel').textContent=(currentMode==='wrong'?'復習モード':'全問モード')+' / シャッフル';
  renderQuestion();updateStats();
}
function makeChoices(ans){return shuffle([ans,...shuffle(ALL_ANSWERS.filter(a=>a!==ans)).slice(0,5)]);}
function renderQuestion(){
  const item=queue[idx];
  if(!item){finishQuiz();return;}
  answered=false;
  document.getElementById('question').innerHTML='No.<span class="num">'+item.no+'</span> '+item.q.replace(/\n/g,'<br>');
  document.getElementById('message').textContent='答えを選んでください。';
  document.getElementById('message').className='';
  const choices=document.getElementById('choices');
  choices.innerHTML='';
  makeChoices(item.answer).forEach(choice=>{
    const b=document.createElement('button');
    b.className='choice';
    b.textContent=choice;
    b.onclick=()=>checkAnswer(b,choice);
    choices.appendChild(b);
  });
  updateStats();
}
function checkAnswer(btn,choice){
  if(answered)return;
  answered=true;
  const item=queue[idx];
  document.querySelectorAll('.choice').forEach(b=>{
    if(b.textContent===item.answer)b.classList.add('correct');
    b.disabled=true;
  });
  const msg=document.getElementById('message');
  if(choice===item.answer){
    score++;
    msg.textContent='正解！ '+item.answer+' / '+item.note;
    msg.className='good';
    wrongNos=wrongNos.filter(n=>n!==item.no);
  }else{
    wrongThisRound++;
    btn.classList.add('wrong');
    msg.textContent='残念。正解は「'+item.answer+'」です。 '+item.note;
    msg.className='bad';
    if(!wrongNos.includes(item.no))wrongNos.push(item.no);
  }
  localStorage.setItem('NorthAmericaNatureWrongNos',JSON.stringify(wrongNos));
  updateStats();renderReview();
}
function showAnswer(){
  if(queue.length===0)return;
  answered=true;
  const item=queue[idx];
  document.querySelectorAll('.choice').forEach(b=>{
    if(b.textContent===item.answer)b.classList.add('correct');
    b.disabled=true;
  });
  const msg=document.getElementById('message');
  msg.textContent='答え：'+item.answer+' / '+item.note;
  msg.className='info';
}
function nextQuestion(){
  if(queue.length===0){startQuiz('all','sequential');return;}
  idx++;
  if(idx>=queue.length)finishQuiz();
  else renderQuestion();
}
function finishQuiz(){
  document.getElementById('question').textContent='終了！';
  document.getElementById('choices').innerHTML='';
  let text='おつかれさま！ 正解 '+score+' / '+queue.length+' 問でした。';
  if(wrongNos.length===0){text+=' 復習リストは空です。'; celebrate();}
  else{text+=' 間違えた問題だけで復習できます。';}
  document.getElementById('message').textContent=text;
  document.getElementById('message').className=wrongNos.length===0?'good':'info';
  updateStats();renderReview();
}
function updateStats(){
  const total=queue.length||DATA.length;
  const now=queue.length?Math.min(idx+1,total):0;
  document.getElementById('progressChip').textContent='進み具合：'+now+' / '+total;
  document.getElementById('scoreChip').textContent='正解：'+score;
  document.getElementById('wrongChip').textContent='間違い：'+wrongThisRound+'（復習 '+wrongNos.length+'問）';
  document.getElementById('reviewSeqBtn').disabled=wrongNos.length===0;
  document.getElementById('reviewRandBtn').disabled=wrongNos.length===0;
}
function renderReview(){
  const box=document.getElementById('reviewList');
  if(wrongNos.length===0){box.innerHTML='<span class="hint">復習リストは空です。</span>';return;}
  box.innerHTML=wrongNos.sort((a,b)=>a-b).map(no=>{
    const item=DATA.find(x=>x.no===no);
    return '<div><b>No.'+item.no+'</b> '+item.answer+' <span class="hint"> '+item.note+'</span></div>';
  }).join('');
}
function toggleDetails(){
  const el=document.getElementById('detailsBox');
  el.style.display=el.style.display==='block'?'none':'block';
}
function resetAll(){
  if(!confirm('復習記録と今の点数をリセットしますか？'))return;
  wrongNos=[];localStorage.removeItem('NorthAmericaNatureWrongNos');
  queue=[];idx=0;score=0;wrongThisRound=0;answered=false;
  document.getElementById('modeLabel').textContent='まだ開始していません';
  document.getElementById('question').textContent='スタートボタンを押してください。';
  document.getElementById('choices').innerHTML='';
  document.getElementById('message').textContent='順番にやるか、ランダムでやるかを選べます。';
  document.getElementById('message').className='info';
  updateStats();renderReview();
}
function buildList(){
  document.getElementById('answerList').innerHTML=DATA.map(item=>'<div><b>No.'+item.no+'</b> '+item.answer+' <span class="hint"> '+item.note+'</span></div>').join('');
}
function celebrate(){
  const canvas=document.getElementById('confettiCanvas'),ctx=canvas.getContext('2d');
  canvas.classList.remove('hidden');
  const dpr=window.devicePixelRatio||1,w=window.innerWidth,h=window.innerHeight;
  canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  const colors=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#facc15'];
  const pieces=Array.from({length:220},()=>({x:Math.random()*w,y:-20-Math.random()*h*.3,r:4+Math.random()*8,color:colors[Math.floor(Math.random()*colors.length)],tilt:Math.random()*Math.PI*2,tiltSpeed:.05+Math.random()*.12,vx:-2+Math.random()*4,vy:2+Math.random()*5,rot:Math.random()*Math.PI*2,vr:-.2+Math.random()*.4}));
  let frame=0;function draw(){ctx.clearRect(0,0,w,h);pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.02;p.tilt+=p.tiltSpeed;p.rot+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.fillRect(-p.r/2,-p.r/2+Math.sin(p.tilt)*2,p.r,p.r*.6);ctx.restore();});frame++;if(frame<320)requestAnimationFrame(draw);else{ctx.clearRect(0,0,w,h);canvas.classList.add('hidden');}}draw();
}
buildList();updateStats();renderReview();

</script>
</body>
</html>
