<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ヨーロッパ統合のあゆみ｜中間テスト対策ゲーム</title>
<style>
  :root{
    --bg:#f6f7fb; --card:#fff; --ink:#1f2937; --muted:#6b7280;
    --accent:#2563eb; --ok:#16a34a; --ng:#dc2626; --line:#e5e7eb;
  }
  *{box-sizing:border-box}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--ink);}
  header{padding:18px 14px; background:linear-gradient(135deg,#dbeafe,#fef3c7); border-bottom:1px solid var(--line);}
  h1{font-size:22px; margin:0 0 6px; text-align:center;}
  .sub{text-align:center; color:#374151; font-size:14px;}
  main{max-width:980px; margin:0 auto; padding:14px;}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; box-shadow:0 6px 18px rgba(0,0,0,.06); margin-bottom:14px;}
  .controls{display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:center;}
  button{border:0; border-radius:12px; padding:10px 14px; font-weight:700; cursor:pointer; background:#e5e7eb; color:#111827;}
  button.primary{background:var(--accent); color:white;}
  button.warn{background:#f59e0b; color:white;}
  button:disabled{opacity:.5; cursor:not-allowed;}
  .stats{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px; color:#374151; font-size:14px;}
  .badge{background:#f3f4f6; border:1px solid var(--line); border-radius:999px; padding:6px 10px;}
  .quiz-card{min-height:250px; display:flex; flex-direction:column; justify-content:space-between; gap:12px;}
  .mode-label{font-weight:800; text-align:center; margin-bottom:8px; color:#374151;}
  .qno{font-weight:800; color:var(--accent); font-size:16px;}
  .question{font-size:20px; line-height:1.7; background:#f9fafb; border:1px solid var(--line); border-radius:14px; padding:16px; white-space:pre-line;}
  .hint{font-size:14px; color:var(--muted); margin-top:4px;}
  .options{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px;}
  .option{background:white; border:2px solid #d1d5db; border-radius:12px; padding:12px 10px; font-size:16px; text-align:center; transition:.12s;}
  .option:hover{border-color:var(--accent); transform:translateY(-1px);}
  .option.correct{border-color:var(--ok); background:#dcfce7;}
  .option.wrong{border-color:var(--ng); background:#fee2e2;}
  .feedback{font-size:17px; font-weight:800; text-align:center; min-height:28px;}
  .feedback.ok{color:var(--ok)}
  .feedback.ng{color:var(--ng)}
  .hidden{display:none !important;}
  .wrong-list{line-height:1.8;}
  .small{font-size:13px; color:var(--muted); line-height:1.5;}
  .answer{font-weight:800;}
  .table-wrap{overflow:auto;}
  table{width:100%; border-collapse:collapse; min-width:760px;}
  th,td{border:1px solid var(--line); padding:9px; vertical-align:top;}
  th{background:#f3f4f6; white-space:nowrap;}
  td:nth-child(1){text-align:center; font-weight:800; width:56px;}
  #confettiCanvas{position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:9999;}
  @media(max-width:600px){
    h1{font-size:19px}
    .question{font-size:17px}
    .option{font-size:15px}
  }
</style>
</head>
<body>
<header>
  <h1>ヨーロッパ統合のあゆみ｜中間テスト対策ゲーム</h1>
  <div class="sub">空欄だけでなく、年号・加盟国・重要語句も問題にしました。</div>
</header>
<main>
  <section class="panel">
    <div class="controls">
      <button class="primary" onclick="startQuiz('all')">全問スタート</button>
      <button onclick="startQuiz('wrong')" id="wrongBtn" disabled>間違えた問題だけ</button>
      <button onclick="shuffleCurrent()">シャッフル</button>
      <button onclick="toggleTable()">一覧表を表示 / 非表示</button>
      <button class="warn" onclick="resetAll()">記録リセット</button>
    </div>
    <div class="stats">
      <span class="badge" id="progress">進み具合：0 / 30</span>
      <span class="badge" id="score">正解：0</span>
      <span class="badge" id="wrong">間違い：0</span>
    </div>
  </section>

  <section class="panel quiz-card">
    <div class="mode-label" id="modeLabel">「全問スタート」を押してください。</div>
    <div>
      <div class="qno" id="qno"></div>
      <div class="question" id="question">ここに問題が出ます。</div>
      <div class="hint" id="hint"></div>
    </div>
    <div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="controls">
      <button onclick="showAnswer()">答えを見る</button>
      <button class="primary" onclick="nextQuestion()">次へ</button>
    </div>
  </section>

  <section class="panel hidden" id="wrongPanel">
    <h2>復習リスト</h2>
    <div class="wrong-list" id="wrongList"></div>
  </section>

  <section class="panel hidden" id="tablePanel">
    <h2>問題と答え 一覧</h2>
    <div class="table-wrap">
      <table id="listTable">
        <thead>
          <tr><th>No.</th><th>問題</th><th>答え</th><th>ミニ説明</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>
<canvas id="confettiCanvas" class="hidden"></canvas>

<script>
const DATA = [
  {
    "no": 1,
    "answer": "EC",
    "q": "【ヨーロッパ統合のあゆみ】\n1967年に発足した「ヨーロッパ共同体」の略称は？",
    "note": "ヨーロッパ共同体＝EC。"
  },
  {
    "no": 2,
    "answer": "マーストリヒト",
    "q": "【ヨーロッパ統合のあゆみ】\n1991年に採択された、ヨーロッパ連合条約ともよばれる（　）条約は？",
    "note": "マーストリヒト条約。1992年調印、1993年発効。"
  },
  {
    "no": 3,
    "answer": "EU",
    "q": "【ヨーロッパ統合のあゆみ】\n1993年に発足した「欧州連合（ヨーロッパ連合）」の略称は？",
    "note": "欧州連合＝EU。"
  },
  {
    "no": 4,
    "answer": "27",
    "q": "【EU】\n現在のEU加盟国数は何か国？",
    "note": "プリントでは27か国。"
  },
  {
    "no": 5,
    "answer": "ブリュッセル",
    "q": "【EUの組織】\nEU本部がある、ベルギーの首都は？",
    "note": "EU本部はブリュッセル。"
  },
  {
    "no": 6,
    "answer": "ベネルクス",
    "q": "【原加盟国】\nオランダ・ベルギー・ルクセンブルクの3国をまとめて何という？",
    "note": "ベネルクス三国。"
  },
  {
    "no": 7,
    "answer": "シェンゲン",
    "q": "【ヨーロッパ統合】\n1995年に発効した、人の移動をしやすくする協定は（　）協定。",
    "note": "シェンゲン協定。1985年署名、1995年発効。"
  },
  {
    "no": 8,
    "answer": "ユーロ",
    "q": "【ヨーロッパ統合】\n1999年に導入されたEUの単一通貨（共通通貨）は？",
    "note": "ユーロ。2002年から紙幣・硬貨の流通開始。"
  },
  {
    "no": 9,
    "answer": "トルコ",
    "q": "【EU加盟をめざす国】\nEU加盟をめざす国の例として、セルビア、モンテネグロ、アルバニア、北マケドニアなどとともに挙げられている国は？",
    "note": "プリントではトルコが空欄。"
  },
  {
    "no": 10,
    "answer": "デンマーク",
    "q": "【EU加盟】\n1973年に、イギリス・アイルランドとともにEUの前身に加盟した国は？",
    "note": "1973年：イギリス、アイルランド、デンマークが加盟。"
  },
  {
    "no": 11,
    "answer": "スウェーデン",
    "q": "【EU加盟】\n1995年に、フィンランド・オーストリアとともにEUに加盟した北ヨーロッパの国は？",
    "note": "1995年：スウェーデン、フィンランド、オーストリアが加盟。"
  },
  {
    "no": 12,
    "answer": "共通農業",
    "q": "【EUの政策】\nEUの共通政策の一つ。（　）政策は、農業に関する共通の政策である。",
    "note": "共通農業政策。"
  },
  {
    "no": 13,
    "answer": "1948年",
    "q": "【年号】\nベネルクス三国関税同盟が発足した年は？",
    "note": "1948年。"
  },
  {
    "no": 14,
    "answer": "1952年",
    "q": "【年号】\nヨーロッパ石炭鉄鋼共同体（ECSC）が発足した年は？",
    "note": "1952年。"
  },
  {
    "no": 15,
    "answer": "ECSC",
    "q": "【略称】\nヨーロッパ石炭鉄鋼共同体の略称は？",
    "note": "ECSC。"
  },
  {
    "no": 16,
    "answer": "1958年",
    "q": "【年号】\nヨーロッパ経済共同体（EEC）とヨーロッパ原子力共同体（EURATOM）が発足した年は？",
    "note": "1958年。"
  },
  {
    "no": 17,
    "answer": "EEC",
    "q": "【略称】\nヨーロッパ経済共同体の略称は？",
    "note": "EEC。"
  },
  {
    "no": 18,
    "answer": "EURATOM",
    "q": "【略称】\nヨーロッパ原子力共同体の略称は？",
    "note": "EURATOM。"
  },
  {
    "no": 19,
    "answer": "フランス",
    "q": "【原加盟国】\nECの原加盟国に含まれる国。ベネルクス三国、ドイツ、イタリアとともに入る国は？",
    "note": "原加盟国はベネルクス三国、フランス、ドイツ、イタリア。"
  },
  {
    "no": 20,
    "answer": "ドイツ",
    "q": "【原加盟国】\nECの原加盟国に含まれる国。ベネルクス三国、フランス、イタリアとともに入る国は？",
    "note": "原加盟国はベネルクス三国、フランス、ドイツ、イタリア。"
  },
  {
    "no": 21,
    "answer": "イタリア",
    "q": "【原加盟国】\nECの原加盟国に含まれる国。ベネルクス三国、フランス、ドイツとともに入る国は？",
    "note": "原加盟国はベネルクス三国、フランス、ドイツ、イタリア。"
  },
  {
    "no": 22,
    "answer": "1981年",
    "q": "【加盟の年】\nギリシャが加盟した年は？",
    "note": "1981年にギリシャ加盟。"
  },
  {
    "no": 23,
    "answer": "1986年",
    "q": "【加盟の年】\nスペイン、ポルトガルが加盟した年は？",
    "note": "1986年にスペイン、ポルトガル加盟。"
  },
  {
    "no": 24,
    "answer": "1990年",
    "q": "【ドイツ】\n東西ドイツが統一され、東ドイツ地域も加盟した年は？",
    "note": "1990年、東西ドイツ統一。"
  },
  {
    "no": 25,
    "answer": "1993年",
    "q": "【EU】\n市場統合が始まり、欧州連合（EU）が発足した年は？",
    "note": "1993年。"
  },
  {
    "no": 26,
    "answer": "2004年",
    "q": "【EU拡大】\nエストニア、ラトビア、リトアニア、ポーランド、ハンガリーなど10か国が加盟した年は？",
    "note": "2004年に10か国加盟。"
  },
  {
    "no": 27,
    "answer": "2007年",
    "q": "【EU拡大】\nブルガリア、ルーマニアが加盟した年は？",
    "note": "2007年。"
  },
  {
    "no": 28,
    "answer": "2013年",
    "q": "【EU拡大】\nクロアチアが加盟した年は？",
    "note": "2013年。"
  },
  {
    "no": 29,
    "answer": "2020年",
    "q": "【EU離脱】\nイギリスがEUを離脱した年は？",
    "note": "2020年。"
  },
  {
    "no": 30,
    "answer": "イギリス",
    "q": "【EU離脱】\n2020年にEUを離脱した国は？",
    "note": "イギリスが離脱。"
  }
];

const ALL_ANSWERS = DATA.map(x => x.answer);
let queue = [];
let index = 0;
let correct = 0;
let wrongCount = 0;
let answered = false;
let currentMode = 'all';
let wrongNos = JSON.parse(localStorage.getItem('europeTimelineWrongNos') || '[]');

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(mode){
  currentMode = mode;
  const base = mode === 'wrong' ? DATA.filter(x => wrongNos.includes(x.no)) : DATA;
  if(base.length === 0){
    alert('復習する問題はまだありません。');
    return;
  }
  queue = shuffle(base);
  index = 0;
  correct = 0;
  wrongCount = 0;
  answered = false;
  document.getElementById('modeLabel').textContent = mode === 'wrong' ? '復習モード：間違えた問題だけ' : '全問モード';
  renderQuestion();
  updateStats();
  renderWrongList();
}

function shuffleCurrent(){
  if(queue.length === 0) queue = shuffle(DATA);
  else queue = shuffle(queue);
  index = 0;
  correct = 0;
  wrongCount = 0;
  answered = false;
  renderQuestion();
  updateStats();
}

function makeChoices(correctAnswer){
  const others = shuffle(ALL_ANSWERS.filter(a => a !== correctAnswer)).slice(0, 5);
  return shuffle([correctAnswer, ...others]);
}

function renderQuestion(){
  const item = queue[index];
  if(!item){ finishQuiz(); return; }
  answered = false;
  document.getElementById('qno').textContent = `No.${item.no}`;
  document.getElementById('question').textContent = item.q;
  document.getElementById('hint').textContent = 'ヒント：空欄だけでなく、年号や重要語句も出題しています。';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  const options = document.getElementById('options');
  options.innerHTML = '';
  makeChoices(item.answer).forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(btn, choice);
    options.appendChild(btn);
  });
  updateStats();
}

function checkAnswer(btn, choice){
  if(answered) return;
  answered = true;
  const item = queue[index];
  const fb = document.getElementById('feedback');
  document.querySelectorAll('.option').forEach(b => {
    if(b.textContent === item.answer) b.classList.add('correct');
    b.disabled = true;
  });
  if(choice === item.answer){
    correct++;
    fb.textContent = `正解！ ${item.answer}`;
    fb.className = 'feedback ok';
    wrongNos = wrongNos.filter(n => n !== item.no);
  }else{
    wrongCount++;
    btn.classList.add('wrong');
    fb.textContent = `残念。正解は「${item.answer}」です。`;
    fb.className = 'feedback ng';
    if(!wrongNos.includes(item.no)) wrongNos.push(item.no);
  }
  localStorage.setItem('europeTimelineWrongNos', JSON.stringify(wrongNos));
  updateStats();
  renderWrongList();
}

function showAnswer(){
  if(queue.length === 0) return;
  answered = true;
  const item = queue[index];
  document.querySelectorAll('.option').forEach(b => {
    if(b.textContent === item.answer) b.classList.add('correct');
    b.disabled = true;
  });
  const fb = document.getElementById('feedback');
  fb.textContent = `答え：${item.answer}（${item.note}）`;
  fb.className = 'feedback ok';
}

function nextQuestion(){
  if(queue.length === 0){ startQuiz('all'); return; }
  index++;
  if(index >= queue.length) finishQuiz();
  else renderQuestion();
}

function finishQuiz(){
  document.getElementById('qno').textContent = '終了！';
  let message = `おつかれさま！ 正解 ${correct} / ${queue.length} 問でした。`;
  if(currentMode === 'wrong' && wrongNos.length === 0){
    message += '\n\n復習までぜんぶクリア！ すばらしい！';
  }
  document.getElementById('question').textContent = message;
  document.getElementById('hint').textContent = wrongNos.length ? '「間違えた問題だけ」で復習しましょう。' : 'すばらしい！今のところ復習リストは空です。';
  document.getElementById('options').innerHTML = '';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  updateStats();
  renderWrongList();
  if(wrongNos.length === 0) celebrate();
}

function updateStats(){
  const total = queue.length || DATA.length;
  const now = queue.length ? Math.min(index + 1, total) : 0;
  document.getElementById('progress').textContent = `進み具合：${now} / ${total}`;
  document.getElementById('score').textContent = `正解：${correct}`;
  document.getElementById('wrong').textContent = `間違い：${wrongCount}（復習 ${wrongNos.length}問）`;
  document.getElementById('wrongBtn').disabled = wrongNos.length === 0;
}

function renderWrongList(){
  const panel = document.getElementById('wrongPanel');
  const div = document.getElementById('wrongList');
  if(wrongNos.length === 0){
    panel.classList.add('hidden');
    div.innerHTML = '';
    return;
  }
  panel.classList.remove('hidden');
  div.innerHTML = wrongNos.sort((a,b) => a - b).map(no => {
    const item = DATA.find(x => x.no === no);
    return `<div><b>No.${item.no}</b>　${item.q.replace(/\n/g,'<br>')}<br>→ <span class="answer">${item.answer}</span> <span class="small">${item.note}</span></div>`;
  }).join('<hr>');
}

function toggleTable(){
  document.getElementById('tablePanel').classList.toggle('hidden');
}

function resetAll(){
  if(!confirm('復習記録と今の点数をリセットしますか？')) return;
  wrongNos = [];
  localStorage.removeItem('europeTimelineWrongNos');
  queue = [];
  index = 0;
  correct = 0;
  wrongCount = 0;
  answered = false;
  currentMode = 'all';
  document.getElementById('modeLabel').textContent = '「全問スタート」を押してください。';
  document.getElementById('qno').textContent = '';
  document.getElementById('question').textContent = 'ここに問題が出ます。';
  document.getElementById('hint').textContent = '';
  document.getElementById('options').innerHTML = '';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  updateStats();
  renderWrongList();
}

function buildTable(){
  const tbody = document.querySelector('#listTable tbody');
  tbody.innerHTML = DATA.map(item =>
    `<tr><td>${item.no}</td><td>${item.q.replace(/\n/g,'<br>')}</td><td class="answer">${item.answer}</td><td>${item.note}</td></tr>`
  ).join('');
}

function celebrate(){
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.classList.remove('hidden');
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const colors = ['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#facc15'];
  const pieces = Array.from({length:220}, () => ({
    x: Math.random() * w,
    y: -20 - Math.random() * h * 0.3,
    r: 4 + Math.random() * 8,
    color: colors[Math.floor(Math.random() * colors.length)],
    tilt: Math.random() * Math.PI * 2,
    tiltSpeed: 0.05 + Math.random() * 0.12,
    vx: -2 + Math.random() * 4,
    vy: 2 + Math.random() * 5,
    rot: Math.random() * Math.PI * 2,
    vr: -0.2 + Math.random() * 0.4
  }));
  let frame = 0;
  function draw(){
    ctx.clearRect(0,0,w,h);
    pieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.02;
      p.tilt += p.tiltSpeed;
      p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r/2, -p.r/2 + Math.sin(p.tilt)*2, p.r, p.r*0.6);
      ctx.restore();
    });
    frame++;
    if(frame < 320) requestAnimationFrame(draw);
    else {
      ctx.clearRect(0,0,w,h);
      canvas.classList.add('hidden');
    }
  }
  draw();
}

buildTable();
updateStats();
renderWrongList();
</script>
</body>
</html>
